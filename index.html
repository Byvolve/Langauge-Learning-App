<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story Reader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 30px 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 36px 40px;
      max-width: 640px;
      width: 100%;
      box-shadow: 0 8px 30px rgba(0,0,0,0.10);
      position: relative;
    }

    /* ── SCREENS ── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── TAAL TOGGLE ── */
    .lang-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      background: #eef2ff;
      color: #4f74e3;
      border: 2px solid #4f74e3;
      border-radius: 99px;
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.15s;
      z-index: 10;
    }
    .lang-toggle:hover { background: #dce3f5; }
    .lang-toggle.hidden { display: none; }

    /* ── BACK LINK ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      color: #7c8db0;
      cursor: pointer;
      margin-bottom: 24px;
      border: none;
      background: none;
      padding: 0;
    }
    .back-link:hover { color: #4f74e3; }

    /* ════════════════════════════════
       SCREEN -1 — TAALKEUZE
    ════════════════════════════════ */
    .lang-select-header {
      text-align: center;
      margin-bottom: 36px;
      padding-top: 12px;
    }
    .lang-select-header h1 {
      font-size: 24px;
      font-weight: 800;
      color: #1a1f36;
      margin-bottom: 6px;
    }
    .lang-select-header p {
      font-size: 15px;
      color: #7c8db0;
    }

    .lang-options {
      display: flex;
      gap: 16px;
    }

    .lang-option-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      border: 2px solid #dce3f5;
      border-radius: 16px;
      padding: 28px 20px;
      background: #f7f9ff;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }
    .lang-option-btn:hover {
      border-color: #4f74e3;
      background: #eef2ff;
      transform: translateY(-2px);
    }
    .lang-flag  { font-size: 48px; line-height: 1; }
    .lang-name  { font-size: 18px; font-weight: 800; color: #1a1f36; }

    /* ════════════════════════════════
       SCREEN 0 — VERHAALKEUZE
    ════════════════════════════════ */
    .select-header { margin-bottom: 28px; }
    .select-header p {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #7c8db0;
      margin-bottom: 6px;
    }
    .select-header h1 { font-size: 26px; font-weight: 800; color: #1a1f36; }

    .story-cards { display: flex; flex-direction: column; gap: 16px; }

    .story-card {
      display: flex;
      align-items: center;
      gap: 18px;
      border: 2px solid #dce3f5;
      border-radius: 16px;
      padding: 18px 20px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      background: #f7f9ff;
    }
    .story-card:hover {
      border-color: #4f74e3;
      background: #eef2ff;
      transform: translateY(-2px);
    }
    .story-card-emoji { font-size: 38px; line-height: 1; flex-shrink: 0; }
    .story-card-info { flex: 1; }
    .story-card-info h2 { font-size: 17px; font-weight: 800; color: #1a1f36; margin-bottom: 4px; }
    .story-card-info p  { font-size: 13px; color: #7c8db0; line-height: 1.5; }
    .story-card-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
    .tag {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      background: #e8ecf5;
      color: #4f74e3;
      border-radius: 99px;
      padding: 4px 10px;
    }
    .tag.done { background: #eafaf1; color: #27ae60; }
    .difficulty { display: flex; gap: 3px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #dce3f5; }
    .dot.filled { background: #4f74e3; }
    .arrow-icon { font-size: 20px; color: #b0bcd4; flex-shrink: 0; }

    /* ════════════════════════════════
       SCREEN 1 — VERHAAL LEZEN
    ════════════════════════════════ */
    .story-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #7c8db0;
      margin-bottom: 6px;
    }
    .story-title { font-size: 26px; font-weight: 800; color: #1a1f36; margin-bottom: 20px; }
    .story-text {
      font-size: 17px;
      line-height: 1.9;
      color: #333;
      background: #f7f9ff;
      border-left: 4px solid #4f74e3;
      border-radius: 10px;
      padding: 22px 24px;
      margin-bottom: 28px;
    }
    .story-text p { margin-bottom: 14px; }
    .story-text p:last-child { margin-bottom: 0; }

    /* ════════════════════════════════
       SCREEN 2 — VRAGEN
    ════════════════════════════════ */
    .progress-bar-wrap {
      background: #e8ecf5;
      border-radius: 99px;
      height: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      background: #4f74e3;
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .progress-label { font-size: 13px; color: #7c8db0; margin-bottom: 20px; text-align: right; }

    details.story-mini {
      font-size: 14px;
      color: #555;
      background: #f7f9ff;
      border-left: 3px solid #4f74e3;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 22px;
      line-height: 1.75;
    }
    details.story-mini summary {
      font-weight: 700;
      color: #4f74e3;
      cursor: pointer;
      font-size: 13px;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    details.story-mini summary::before { content: '▶'; font-size: 9px; transition: transform 0.2s; }
    details.story-mini[open] summary::before { transform: rotate(90deg); }
    details.story-mini[open] summary { margin-bottom: 12px; }
    details.story-mini .mini-text p { margin-bottom: 10px; }
    details.story-mini .mini-text p:last-child { margin-bottom: 0; }

    .question-text { font-size: 20px; font-weight: 700; color: #1a1f36; margin-bottom: 22px; line-height: 1.4; }

    .options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }

    .option-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #f7f9ff;
      border: 2px solid #dce3f5;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 16px;
      color: #1a1f36;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      width: 100%;
    }
    .option-btn:hover:not(:disabled) { border-color: #4f74e3; background: #eef2ff; transform: translateY(-1px); }
    .option-btn .letter {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #dce3f5;
      font-weight: 700;
      font-size: 13px;
      color: #4f74e3;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    .option-btn.correct { background: #eafaf1; border-color: #27ae60; }
    .option-btn.correct .letter { background: #27ae60; color: white; }
    .option-btn.wrong   { background: #fff0f0; border-color: #e74c3c; }
    .option-btn.wrong   .letter { background: #e74c3c; color: white; }
    .option-btn:disabled { cursor: default; }

    .feedback-msg {
      font-size: 15px;
      font-weight: 600;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: none;
    }
    .feedback-msg.correct { background: #eafaf1; color: #1e8449; display: block; }
    .feedback-msg.wrong   { background: #fff0f0; color: #c0392b; display: block; }

    /* ════════════════════════════════
       SCREEN 3 — RESULTATEN
    ════════════════════════════════ */
    .results-icon  { font-size: 60px; text-align: center; margin-bottom: 12px; }
    .results-title { font-size: 26px; font-weight: 800; color: #1a1f36; text-align: center; margin-bottom: 6px; }
    .results-score { font-size: 18px; color: #7c8db0; text-align: center; margin-bottom: 28px; }
    .results-score span { color: #4f74e3; font-weight: 700; }

    .results-list { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
    .results-list li { padding: 12px 16px; border-radius: 10px; font-size: 14px; line-height: 1.5; }
    .results-list li.ok   { background: #eafaf1; color: #1e8449; }
    .results-list li.fail { background: #fff0f0; color: #c0392b; }
    .results-list li .q-label { font-weight: 700; display: block; margin-bottom: 2px; }

    /* ── GEDEELDE KNOPPEN ── */
    .btn-primary {
      display: block;
      width: 100%;
      background: #4f74e3;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:hover { background: #3a5fc9; transform: translateY(-1px); }

    .btn-secondary {
      display: block;
      width: 100%;
      background: transparent;
      color: #4f74e3;
      border: 2px solid #4f74e3;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: #eef2ff; }
  </style>
</head>
<body>
<div class="card">

  <!-- Toggle knop — altijd zichtbaar (verborgen op taalkeuze-scherm) -->
  <button class="lang-toggle hidden" id="lang-toggle" onclick="toggleLang()">NL</button>

  <!-- ════ SCHERM -1: TAALKEUZE ════ -->
  <div id="screen-lang" class="screen active">
    <div class="lang-select-header">
      <h1>Choose your language</h1>
      <p>Kies je taal</p>
    </div>
    <div class="lang-options">
      <button class="lang-option-btn" onclick="selectLang('en')">
        <span class="lang-flag">🇬🇧</span>
        <span class="lang-name">English</span>
      </button>
      <button class="lang-option-btn" onclick="selectLang('nl')">
        <span class="lang-flag">🇳🇱</span>
        <span class="lang-name">Nederlands</span>
      </button>
    </div>
  </div>

  <!-- ════ SCHERM 0: VERHAALKEUZE ════ -->
  <div id="screen-select" class="screen">
    <div class="select-header">
      <p id="ui-lang-label"></p>
      <h1 id="ui-choose-story"></h1>
    </div>
    <div class="story-cards" id="story-cards-wrap"></div>
  </div>

  <!-- ════ SCHERM 1: VERHAAL LEZEN ════ -->
  <div id="screen-story" class="screen">
    <button class="back-link" id="ui-back-link" onclick="showScreen('screen-select')"></button>
    <p class="story-label" id="ui-read-story"></p>
    <h1 class="story-title" id="story-title"></h1>
    <div class="story-text" id="story-body"></div>
    <button class="btn-primary" id="ui-start-btn" onclick="startQuestions()"></button>
  </div>

  <!-- ════ SCHERM 2: VRAGEN ════ -->
  <div id="screen-question" class="screen">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <p class="progress-label" id="progress-label"></p>

    <details class="story-mini" id="story-mini-wrap">
      <summary><span id="ui-reread"></span></summary>
      <div class="mini-text" id="story-mini-text"></div>
    </details>

    <p class="question-text" id="question-text"></p>
    <div class="options" id="options-wrap"></div>
    <div class="feedback-msg" id="feedback-msg"></div>
    <button class="btn-primary" id="next-btn" style="display:none;" onclick="nextQuestion()"></button>
  </div>

  <!-- ════ SCHERM 3: RESULTATEN ════ -->
  <div id="screen-results" class="screen">
    <div class="results-icon" id="results-icon"></div>
    <h2 class="results-title" id="results-title"></h2>
    <p class="results-score" id="results-score"></p>
    <ul class="results-list" id="results-list"></ul>
    <button class="btn-primary" id="ui-try-again" onclick="startQuestions()"></button>
    <button class="btn-secondary" id="ui-reread-story" onclick="showScreen('screen-story')"></button>
    <button class="btn-secondary" id="ui-choose-another" onclick="showScreen('screen-select')"></button>
  </div>

</div>

      chooseAnother:  "Kies een ander verhaal",

  // ══════════════════════════════════════════════
  //  VERHALEN (tweetalig)
  // ══════════════════════════════════════════════
  const stories = [
    {
      emoji: "🧺",
      difficulty: 1,
      en: {
        title:  "Family Picnic",

        ],

          { question: "What did mom bring?",                      options: ["Cookies, milk, and fruit","Sandwiches, apples, and juice","Pizza, chips, and water","Cake, tea, and biscuits"], correct: 1 },
          { question: "What game did they play after eating?",    options: ["Football","Tag","Hide and seek","Catch"],                                                correct: 2 },

        ]
      },
      nl: {
        title:  "Familiedag in het Park",

          { question: "Waar ging de familie heen afgelopen zondag?",      options: ["Naar het strand","Naar een restaurant","Naar school","Naar het park"],                    correct: 3 },
          { question: "Wat nam moeder mee?",                              options: ["Koekjes, melk en fruit","Boterhammen, appels en sap","Pizza, chips en water","Taart, thee en koekjes"], correct: 1 },
          { question: "Welk spel speelden ze na het eten?",               options: ["Voetbal","Tikkertje","Verstoppertje","Vangen"],                                            correct: 2 },
          { question: "Waar verstopte James zich?",                       options: ["Achter een struik","Onder het kleedje","Achter zijn moeder","Achter de boom"],             correct: 3 }

    },
    {
      emoji: "🐶",
      difficulty: 1,
      en: {
        title:  "My Dog Max",
        teaser: "Meet Max — the funniest dog in the neighbourhood.",
        paragraphs: [

          { question: "Hoe ziet Max eruit?",             options: ["Klein en wit","Groot en bruin","Piepklein en zwart","Lang en grijs"],                           correct: 1 },
          { question: "Wat doet Max na het eten?",       options: ["Hij speelt met een bal","Hij drinkt water uit zijn bak","Hij rent in de tuin","Hij slaapt op de bank"], correct: 1 },
          { question: "Waar lopen ze langs?",            options: ["Het park en de rivier","Het strand en de winkels","De winkels en de school","De school en het park"], correct: 2 },
          { question: "Welke kleur heeft Max zijn mand?",options: ["Blauw","Groen","Geel","Rood"],                                                                  correct: 3 }
        ]
      }
    }
  ];

  // ══════════════════════════════════════════════
  //  STATE
  // ══════════════════════════════════════════════
  let lang         = "en";
  let currentStory = null;   // root story object (taal-neutraal)
  let currentQ     = 0;
  let score        = 0;
  let answers      = [];
  const progress   = {};     // { idx: { done, best } } — taal-neutraal

  // Helper: geeft het taalspecifieke deel van een verhaal
  function storyContent(story) { return story[lang]; }

  // ══════════════════════════════════════════════
  //  TAAL
  // ══════════════════════════════════════════════
  function selectLang(selected) {
    lang = selected;
    document.documentElement.setAttribute("lang", lang);
    document.getElementById("lang-toggle").textContent = i18n[lang].toggleLabel;
    document.getElementById("lang-toggle").classList.remove("hidden");
    applyTranslations();
    showScreen("screen-select");
  }

  function toggleLang() {
    lang = (lang === "en") ? "nl" : "en";
    document.documentElement.setAttribute("lang", lang);
    document.getElementById("lang-toggle").textContent = i18n[lang].toggleLabel;
    applyTranslations();

    // Herrender het actieve scherm
    const activeId = document.querySelector(".screen.active")?.id;
    switch (activeId) {
      case "screen-select":
        buildSelectionCards();
        break;
      case "screen-story":
        if (currentStory) updateStoryScreen();
        break;
      case "screen-question":
        if (currentStory) renderQuestion();
        break;
      case "screen-results":
        renderResults();
        break;
    }
  }

  function applyTranslations() {
    const t = i18n[lang];
    document.getElementById("ui-lang-label").textContent    = t.langLabel;
    document.getElementById("ui-choose-story").textContent  = t.chooseStory;
    document.getElementById("ui-back-link").textContent     = t.allStories;
    document.getElementById("ui-read-story").textContent    = t.readStory;
    document.getElementById("ui-start-btn").textContent     = t.startQuestions;
    document.getElementById("ui-reread").textContent        = t.reread;
    document.getElementById("ui-try-again").textContent     = t.tryAgain;
    document.getElementById("ui-reread-story").textContent  = t.rereadStory;
    document.getElementById("ui-choose-another").textContent = t.chooseAnother;
  }

  // ══════════════════════════════════════════════
  //  VERHAALKEUZE
  // ══════════════════════════════════════════════
  function buildSelectionCards() {
    const t    = i18n[lang];
    const wrap = document.getElementById("story-cards-wrap");
    wrap.innerHTML = "";

    stories.forEach((story, idx) => {
      const c    = storyContent(story);
      const p    = progress[idx];
      const done = p && p.done;
      const best = p ? p.best : null;

      const card = document.createElement("div");
      card.className = "story-card";
      card.onclick   = () => openStory(idx);

      let dots = "";
      for (let d = 1; d <= 3; d++) {
        dots += `<span class="dot${d <= story.difficulty ? " filled" : ""}"></span>`;
      }

      const tagHTML = done
        ? `<span class="tag done">✓ ${t.doneTag} · ${best}/${c.questions.length}</span>`
        : `<span class="tag">${c.questions.length} ${t.questionsTag}</span>`;

      card.innerHTML = `
        <div class="story-card-emoji">${story.emoji}</div>
        <div class="story-card-info">
          <h2>${c.title}</h2>
          <p>${c.teaser}</p>
        </div>
        <div class="story-card-meta">
          ${tagHTML}
          <div class="difficulty">${dots}</div>
        </div>
        <span class="arrow-icon">›</span>
      `;
      wrap.appendChild(card);
    });
  }

  function openStory(idx) {
    currentStory = stories[idx];
    currentStory._idx = idx;
    updateStoryScreen();
    showScreen("screen-story");
  }

  function updateStoryScreen() {
    const c = storyContent(currentStory);
    document.getElementById("story-title").textContent = c.title;
    const bodyEl = document.getElementById("story-body");
    bodyEl.innerHTML = c.paragraphs.map(p => `<p>${p}</p>`).join("");
    const miniEl = document.getElementById("story-mini-text");
    miniEl.innerHTML = c.paragraphs.map(p => `<p>${p}</p>`).join("");
  }

  // ══════════════════════════════════════════════
  //  SCHERMEN
  // ══════════════════════════════════════════════
  function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    window.scrollTo({ top: 0, behavior: "smooth" });
    if (id === "screen-select") buildSelectionCards();
    // Toggle verbergen op taalkeuze-scherm
    const toggle = document.getElementById("lang-toggle");
    if (id === "screen-lang") {
      toggle.classList.add("hidden");
    } else {
      toggle.classList.remove("hidden");
    }
  }

  // ══════════════════════════════════════════════
  //  VRAGEN
  // ══════════════════════════════════════════════
  function startQuestions() {
    currentQ = 0;
    score    = 0;
    answers  = [];
    renderQuestion();
    showScreen("screen-question");
  }

  function renderQuestion() {
    const t     = i18n[lang];
    const c     = storyContent(currentStory);
    const q     = c.questions[currentQ];
    const total = c.questions.length;

    const pct = (currentQ / total) * 100;
    document.getElementById("progress-fill").style.width = pct + "%";
    document.getElementById("progress-label").textContent = t.questionOf(currentQ + 1, total);

    document.getElementById("question-text").textContent = q.question;

    const wrap = document.getElementById("options-wrap");
    wrap.innerHTML = "";
    const letters = ["A", "B", "C", "D"];
    q.options.forEach((opt, i) => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.innerHTML = `<span class="letter">${letters[i]}</span> ${opt}`;
      btn.onclick   = () => selectAnswer(i);
      wrap.appendChild(btn);
    });

    const fb = document.getElementById("feedback-msg");
    fb.className   = "feedback-msg";
    fb.textContent = "";
    document.getElementById("next-btn").style.display = "none";
    document.getElementById("story-mini-wrap").removeAttribute("open");
  }

  function selectAnswer(chosen) {
    const t       = i18n[lang];
    const c       = storyContent(currentStory);
    const q       = c.questions[currentQ];
    const correct = q.correct;
    const isRight = chosen === correct;

    if (isRight) score++;
    answers.push({ correct: isRight, chosen, right: correct });

    document.querySelectorAll(".option-btn").forEach((btn, i) => {
      btn.disabled = true;
      if (i === correct) btn.classList.add("correct");
      if (i === chosen && !isRight) btn.classList.add("wrong");
    });

    const fb = document.getElementById("feedback-msg");
    if (isRight) {
      fb.textContent = t.correct;
      fb.className   = "feedback-msg correct";
    } else {
      fb.textContent = t.wrong(q.options[correct]);
      fb.className   = "feedback-msg wrong";
    }

    const nextBtn  = document.getElementById("next-btn");
    nextBtn.style.display = "block";
    const isLast   = currentQ === c.questions.length - 1;
    nextBtn.textContent = isLast ? t.seeResults : t.nextQuestion;
  }

  function nextQuestion() {
    currentQ++;
    const c = storyContent(currentStory);
    if (currentQ < c.questions.length) {
      renderQuestion();
    } else {
      saveProgress();
      renderResults();
      showScreen("screen-results");
    }
  }

  // ══════════════════════════════════════════════
  //  RESULTATEN
  // ══════════════════════════════════════════════
  function saveProgress() {
    const idx = currentStory._idx;
    if (!progress[idx] || score > progress[idx].best) {
      progress[idx] = { done: true, best: score };
    }
  }

  function renderResults() {
    const t     = i18n[lang];
    const c     = storyContent(currentStory);
    const total = c.questions.length;
    const pct   = score / total;

    let icon, title;
    if (pct === 1)        { icon = "🏆"; title = t.perfectScore; }
    else if (pct >= 0.75) { icon = "🌟"; title = t.greatJob; }
    else if (pct >= 0.5)  { icon = "👍"; title = t.goodEffort; }
    else                  { icon = "📖"; title = t.keepPractising; }

    document.getElementById("results-icon").textContent  = icon;
    document.getElementById("results-title").textContent = title;
    document.getElementById("results-score").innerHTML   = t.gotCorrect(score, total);

    const list = document.getElementById("results-list");
    list.innerHTML = "";
    answers.forEach((a, i) => {
      const q  = c.questions[i];
      const li = document.createElement("li");
      li.className = a.correct ? "ok" : "fail";
      const mark = a.correct ? "✓" : "✗";
      li.innerHTML = `<span class="q-label">${mark} ${q.question}</span>` +
        (a.correct
          ? `${t.yourAnswer} <strong>${q.options[a.chosen]}</strong>`
          : `${t.yourAnswer} ${q.options[a.chosen]} — ${t.correctAnswer} <strong>${q.options[a.right]}</strong>`);
      list.appendChild(li);
    });
  }
</script>
</body>
</html>
