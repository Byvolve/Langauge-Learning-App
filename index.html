<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Learning App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 30px 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 36px 40px;
      max-width: 640px;
      width: 100%;
      box-shadow: 0 8px 30px rgba(0,0,0,0.10);
      position: relative;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    /* ── LANG INDICATOR (top right) ── */
    .lang-indicator {
      position: absolute;
      top: 16px; right: 16px;
      display: flex; align-items: center; gap: 6px;
      background: #eef2ff;
      color: #4f74e3;
      border: 1.5px solid #c5d0f5;
      border-radius: 99px;
      padding: 5px 12px;
      font-size: 12px; font-weight: 700;
      cursor: pointer; z-index: 10;
      transition: background 0.15s;
    }
    .lang-indicator:hover { background: #dce3f5; }
    .lang-indicator:focus { outline: 2px solid #4f74e3; outline-offset: 2px; }
    .lang-indicator.hidden { display: none; }

    /* ── BACK LINK ── */
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 700; color: #7c8db0;
      cursor: pointer; margin-bottom: 24px;
      border: none; background: none; padding: 0;
    }
    .back-link:hover { color: #4f74e3; }
    .back-link:focus { outline: 2px solid #4f74e3; border-radius: 4px; }

    /* ════ LANGUAGE SELECTION SCREENS ════ */
    .lang-screen-header {
      text-align: center; margin-bottom: 36px; padding-top: 8px;
    }
    .lang-screen-header h1 {
      font-size: 24px; font-weight: 800; color: #1a1f36; margin-bottom: 10px;
    }
    .lang-screen-header p { font-size: 15px; color: #7c8db0; line-height: 1.6; }

    .lang-options { display: flex; gap: 16px; }

    .lang-option-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 10px;
      border: 2px solid #dce3f5; border-radius: 16px;
      padding: 28px 16px; background: #f7f9ff; cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      font-family: inherit;
    }
    .lang-option-btn:hover { border-color: #4f74e3; background: #eef2ff; transform: translateY(-2px); }
    .lang-option-btn:focus { outline: 2px solid #4f74e3; outline-offset: 2px; }
    .lang-flag { font-size: 44px; line-height: 1; }
    .lang-name { font-size: 17px; font-weight: 800; color: #1a1f36; }
    .lang-native { font-size: 13px; color: #7c8db0; }

    /* ════ STORY SELECTION ════ */
    .select-header { margin-bottom: 28px; }
    .select-header .label-sm {
      font-size: 12px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: #7c8db0; margin-bottom: 6px;
    }
    .select-header h1 { font-size: 26px; font-weight: 800; color: #1a1f36; }

    .story-cards { display: flex; flex-direction: column; gap: 16px; }

    .story-card {
      display: flex; align-items: center; gap: 18px;
      border: 2px solid #dce3f5; border-radius: 16px;
      padding: 18px 20px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      background: #f7f9ff; width: 100%; text-align: left;
      font-family: inherit;
    }
    .story-card:hover { border-color: #4f74e3; background: #eef2ff; transform: translateY(-2px); }
    .story-card:focus { outline: 2px solid #4f74e3; outline-offset: 2px; }
    .story-card-emoji { font-size: 38px; line-height: 1; flex-shrink: 0; }
    .story-card-info { flex: 1; }
    .story-card-info h2 { font-size: 17px; font-weight: 800; color: #1a1f36; margin-bottom: 4px; }
    .story-card-info p  { font-size: 13px; color: #7c8db0; line-height: 1.5; }
    .story-card-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
    .tag {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.8px; text-transform: uppercase;
      background: #e8ecf5; color: #4f74e3;
      border-radius: 99px; padding: 4px 10px;
    }
    .tag.done { background: #eafaf1; color: #27ae60; }
    .difficulty { display: flex; gap: 3px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #dce3f5; }
    .dot.filled { background: #4f74e3; }
    .arrow-icon { font-size: 20px; color: #b0bcd4; flex-shrink: 0; }

    /* ════ STORY READING ════ */
    .story-label {
      font-size: 12px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: #7c8db0; margin-bottom: 6px;
    }
    .story-title { font-size: 26px; font-weight: 800; color: #1a1f36; margin-bottom: 20px; }

    .keywords-bar {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 20px; padding: 14px 16px;
      background: #fffbf0; border: 1.5px solid #fde8a0;
      border-radius: 10px; align-items: center;
    }
    .keywords-bar.hidden { display: none; }
    .keywords-bar-label {
      font-size: 12px; font-weight: 700; color: #b48a00;
      margin-right: 4px; white-space: nowrap;
    }
    .keyword-chip {
      font-size: 13px; background: #fff3c4; color: #8a6300;
      border-radius: 99px; padding: 3px 10px; cursor: pointer;
      border: 1.5px solid #f5d060; font-weight: 600;
      transition: background 0.1s; font-family: inherit;
    }
    .keyword-chip:hover { background: #f5d060; }
    .keyword-chip:focus { outline: 2px solid #b48a00; }

    .story-text {
      font-size: 17px; line-height: 1.9; color: #333;
      background: #f7f9ff; border-left: 4px solid #4f74e3;
      border-radius: 10px; padding: 22px 24px; margin-bottom: 28px;
    }
    .story-text p { margin-bottom: 14px; }
    .story-text p:last-child { margin-bottom: 0; }

    .keyword-btn {
      background: none; border: none;
      border-bottom: 2px solid #f5d060;
      cursor: pointer; padding: 0 1px;
      font-size: inherit; font-family: inherit; line-height: inherit;
      font-weight: 600; color: #7a5500;
      transition: background 0.1s;
    }
    .keyword-btn:hover { background: #fff3c4; border-radius: 3px; }
    .keyword-btn:focus { outline: 2px solid #b48a00; border-radius: 3px; outline-offset: 1px; }

    /* ── WORD POPUP ── */
    .word-popup {
      position: absolute;
      background: white; border: 2px solid #4f74e3;
      border-radius: 14px; padding: 16px 18px;
      max-width: 280px; z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
    .word-popup.hidden { display: none; }
    .popup-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 8px;
    }
    .popup-word { font-size: 20px; font-weight: 800; color: #1a1f36; }
    .popup-close {
      background: none; border: none; font-size: 20px;
      color: #b0bcd4; cursor: pointer; padding: 0; line-height: 1;
    }
    .popup-close:hover { color: #1a1f36; }
    .popup-translation { font-size: 16px; font-weight: 700; color: #4f74e3; margin-bottom: 8px; }
    .popup-example-label {
      font-size: 11px; font-weight: 700; color: #b0bcd4;
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px;
    }
    .popup-example { font-size: 13px; color: #7c8db0; font-style: italic; line-height: 1.5; }

    /* ════ QUESTIONS ════ */
    .progress-bar-wrap {
      background: #e8ecf5; border-radius: 99px;
      height: 8px; margin-bottom: 10px; overflow: hidden;
    }
    .progress-bar-fill {
      background: #4f74e3; height: 100%;
      border-radius: 99px; transition: width 0.4s ease;
    }
    .progress-label { font-size: 13px; color: #7c8db0; margin-bottom: 20px; text-align: right; }

    details.story-mini {
      font-size: 14px; color: #555; background: #f7f9ff;
      border-left: 3px solid #4f74e3; border-radius: 8px;
      padding: 12px 16px; margin-bottom: 22px; line-height: 1.75;
    }
    details.story-mini summary {
      font-weight: 700; color: #4f74e3; cursor: pointer;
      font-size: 13px; list-style: none;
      display: flex; align-items: center; gap: 6px;
    }
    details.story-mini summary::before { content: '▶'; font-size: 9px; transition: transform 0.2s; }
    details.story-mini[open] summary::before { transform: rotate(90deg); }
    details.story-mini[open] summary { margin-bottom: 12px; }
    details.story-mini .mini-text p { margin-bottom: 10px; }
    details.story-mini .mini-text p:last-child { margin-bottom: 0; }

    .question-text { font-size: 20px; font-weight: 700; color: #1a1f36; margin-bottom: 22px; line-height: 1.4; }

    .options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }

    .option-btn {
      display: flex; align-items: center; gap: 14px;
      background: #f7f9ff; border: 2px solid #dce3f5;
      border-radius: 12px; padding: 14px 18px;
      font-size: 16px; color: #1a1f36; cursor: pointer;
      text-align: left; font-family: inherit;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      width: 100%;
    }
    .option-btn:hover:not(:disabled) { border-color: #4f74e3; background: #eef2ff; transform: translateY(-1px); }
    .option-btn:focus { outline: 2px solid #4f74e3; outline-offset: 2px; }
    .option-btn .letter {
      display: flex; align-items: center; justify-content: center;
      min-width: 30px; height: 30px; border-radius: 50%;
      background: #dce3f5; font-weight: 700; font-size: 13px;
      color: #4f74e3; flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    .option-btn.correct { background: #eafaf1; border-color: #27ae60; }
    .option-btn.correct .letter { background: #27ae60; color: white; }
    .option-btn.wrong   { background: #fff0f0; border-color: #e74c3c; }
    .option-btn.wrong   .letter { background: #e74c3c; color: white; }
    .option-btn:disabled { cursor: default; transform: none; }

    .feedback-box {
      border-radius: 12px; padding: 14px 18px;
      margin-bottom: 20px; display: none;
    }
    .feedback-box.correct { background: #eafaf1; border: 1.5px solid #a3e6c0; display: block; }
    .feedback-box.wrong   { background: #fff0f0; border: 1.5px solid #f5c0c0; display: block; }
    .feedback-verdict { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .feedback-box.correct .feedback-verdict { color: #1e8449; }
    .feedback-box.wrong   .feedback-verdict { color: #c0392b; }
    .feedback-explanation { font-size: 14px; color: #555; line-height: 1.6; font-style: italic; }

    /* ════ RESULTS ════ */
    .results-icon  { font-size: 60px; text-align: center; margin-bottom: 12px; }
    .results-title { font-size: 26px; font-weight: 800; color: #1a1f36; text-align: center; margin-bottom: 6px; }
    .results-score { font-size: 18px; color: #7c8db0; text-align: center; margin-bottom: 28px; }
    .results-score span { color: #4f74e3; font-weight: 700; }
    .results-list { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
    .results-list li { padding: 12px 16px; border-radius: 10px; font-size: 14px; line-height: 1.5; }
    .results-list li.ok   { background: #eafaf1; color: #1e8449; }
    .results-list li.fail { background: #fff0f0; color: #c0392b; }
    .results-list li .q-label { font-weight: 700; display: block; margin-bottom: 2px; }

    /* ── SHARED BUTTONS ── */
    .btn-primary {
      display: block; width: 100%; background: #4f74e3;
      color: white; border: none; border-radius: 12px;
      padding: 16px; font-size: 17px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:hover { background: #3a5fc9; transform: translateY(-1px); }
    .btn-primary:focus { outline: 2px solid #3a5fc9; outline-offset: 2px; }

    .btn-secondary {
      display: block; width: 100%; background: transparent;
      color: #4f74e3; border: 2px solid #4f74e3;
      border-radius: 12px; padding: 14px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      margin-top: 12px; font-family: inherit;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: #eef2ff; }
    .btn-secondary:focus { outline: 2px solid #4f74e3; outline-offset: 2px; }

    /* ════ WORD INTRO ════ */
    .word-intro-header { margin-bottom: 24px; }
    .word-intro-eyebrow {
      font-size: 12px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: #7c8db0; margin-bottom: 6px;
    }
    .word-intro-story-title { font-size: 24px; font-weight: 800; color: #1a1f36; margin-bottom: 8px; }
    .word-intro-instruction  { font-size: 15px; color: #7c8db0; line-height: 1.6; }

    .word-cards { display: flex; flex-direction: column; gap: 14px; margin-bottom: 28px; }

    .word-card {
      background: #f7f9ff; border: 1.5px solid #dce3f5;
      border-radius: 14px; padding: 18px 20px;
    }
    .word-card-nl  { font-size: 22px; font-weight: 800; color: #1a1f36; margin-bottom: 4px; }
    .word-card-en  { font-size: 15px; font-weight: 600; color: #4f74e3; margin-bottom: 8px; }
    .word-card-example {
      font-size: 13px; color: #7c8db0; font-style: italic; line-height: 1.5;
      border-top: 1px solid #e8ecf5; padding-top: 8px;
    }

    @media (max-width: 500px) {
      body { padding: 16px 12px; }
      .card { padding: 24px 20px; }
      .lang-options { flex-direction: column; }
      .lang-option-btn { flex-direction: row; padding: 18px 16px; }
      .lang-flag { font-size: 32px; }
    }
  </style>
</head>
<body>
<div class="card">

  <button class="lang-indicator hidden" id="lang-indicator" onclick="goToLangScreen()">
    <span id="ui-indicator-flag"></span>
    <span id="ui-indicator-label"></span>
  </button>

  <div id="word-popup" class="word-popup hidden" role="dialog" aria-label="Word explanation">
    <div class="popup-header">
      <span class="popup-word" id="popup-word"></span>
      <button class="popup-close" onclick="closeWordPopup()" aria-label="Close">×</button>
    </div>
    <div class="popup-translation" id="popup-translation"></div>
    <div class="popup-example-label" id="popup-example-label"></div>
    <div class="popup-example" id="popup-example"></div>
  </div>

  <!-- ════ SCREEN 1: INTERFACE LANGUAGE ════ -->
  <div id="screen-ui-lang" class="screen active">
    <div class="lang-screen-header">
      <h1>Choose your language<br><span style="font-size:18px;font-weight:600;color:#7c8db0">Kies je taal</span></h1>
      <p>For buttons and instructions<br><span style="font-size:13px;color:#aab">Voor knoppen en uitleg</span></p>
    </div>
    <div class="lang-options">
      <button class="lang-option-btn" onclick="selectUiLang('en')">
        <span class="lang-flag">🇬🇧</span>
        <span class="lang-name">English</span>
      </button>
      <button class="lang-option-btn" onclick="selectUiLang('nl')">
        <span class="lang-flag">🇳🇱</span>
        <span class="lang-name">Nederlands</span>
      </button>
    </div>
  </div>

  <!-- ════ SCREEN 2: LEARNING LANGUAGE ════ -->
  <div id="screen-learn-lang" class="screen">
    <div class="lang-screen-header">
      <h1 id="ui-learn-title"></h1>
      <p id="ui-learn-subtitle"></p>
    </div>
    <div class="lang-options">
      <button class="lang-option-btn" onclick="selectLearnLang('en')">
        <span class="lang-flag">🇬🇧</span>
        <span class="lang-name">English</span>
      </button>
      <button class="lang-option-btn" onclick="selectLearnLang('nl')">
        <span class="lang-flag">🇳🇱</span>
        <span class="lang-name">Nederlands</span>
      </button>
    </div>
  </div>

  <!-- ════ SCREEN 3: STORY SELECTION ════ -->
  <div id="screen-select" class="screen">
    <div class="select-header">
      <p class="label-sm" id="ui-lang-label"></p>
      <h1 id="ui-choose-story"></h1>
    </div>
    <div class="story-cards" id="story-cards-wrap"></div>
  </div>

  <!-- ════ SCREEN 3b: WORD INTRO ════ -->
  <div id="screen-word-intro" class="screen">
    <button class="back-link" id="ui-word-intro-back" onclick="showScreen('screen-select')"></button>
    <div class="word-intro-header">
      <p class="word-intro-eyebrow" id="ui-word-intro-eyebrow"></p>
      <h1 class="word-intro-story-title" id="word-intro-story-title"></h1>
      <p class="word-intro-instruction" id="ui-word-intro-instruction"></p>
    </div>
    <div class="word-cards" id="word-cards-wrap"></div>
    <button class="btn-primary" id="ui-word-intro-btn" onclick="showScreen('screen-story')"></button>
  </div>

  <!-- ════ SCREEN 4: STORY READING ════ -->
  <div id="screen-story" class="screen">
    <button class="back-link" id="ui-back-link" onclick="showScreen('screen-select')"></button>
    <p class="story-label" id="ui-read-story"></p>
    <h1 class="story-title" id="story-title"></h1>
    <div class="keywords-bar hidden" id="keywords-bar">
      <span class="keywords-bar-label" id="ui-keywords-label"></span>
      <span id="keywords-chips-wrap"></span>
    </div>
    <div class="story-text" id="story-body"></div>
    <button class="btn-primary" id="ui-start-btn" onclick="startQuestions()"></button>
  </div>

  <!-- ════ SCREEN 5: QUESTIONS ════ -->
  <div id="screen-question" class="screen">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <p class="progress-label" id="progress-label"></p>
    <details class="story-mini" id="story-mini-wrap">
      <summary><span id="ui-reread"></span></summary>
      <div class="mini-text" id="story-mini-text"></div>
    </details>
    <p class="question-text" id="question-text"></p>
    <div class="options" id="options-wrap"></div>
    <div class="feedback-box" id="feedback-box">
      <div class="feedback-verdict" id="feedback-verdict"></div>
      <div class="feedback-explanation" id="feedback-explanation"></div>
    </div>
    <button class="btn-primary" id="next-btn" style="display:none;" onclick="nextQuestion()"></button>
  </div>

  <!-- ════ SCREEN 6: RESULTS ════ -->
  <div id="screen-results" class="screen">
    <div class="results-icon" id="results-icon"></div>
    <h2 class="results-title" id="results-title"></h2>
    <p class="results-score" id="results-score"></p>
    <ul class="results-list" id="results-list"></ul>
    <button class="btn-primary" id="ui-try-again" onclick="startQuestions()"></button>
    <button class="btn-secondary" id="ui-reread-story" onclick="showScreen('screen-story')"></button>
    <button class="btn-secondary" id="ui-choose-another" onclick="showScreen('screen-select')"></button>
  </div>

</div>

<script>
  // ══════════════════════════════════════════
  //  I18N
  // ══════════════════════════════════════════
  const i18n = {
    en: {
      learnTitle:     "What do you want to practise?",
      learnSubtitle:  "Choose the language you want to learn.",
      langLabel:      "Stories",
      chooseStory:    "Choose a story",
      readStory:      "Read the story",
      allStories:     "← All stories",
      startQuestions: "I'm ready — start the questions!",
      reread:         "Re-read the story",
      keywordsLabel:  "Key words:",
      questionOf:     (x, y) => `Question ${x} of ${y}`,
      correct:        "Correct!",
      wrong:          (ans) => `Not quite. The answer was: "${ans}"`,
      nextQuestion:   "Next question →",
      seeResults:     "See my results!",
      perfectScore:   "Perfect score!",
      greatJob:       "Great job!",
      goodEffort:     "Good effort!",
      keepPractising: "Keep practising!",
      gotCorrect:     (x, y) => `You got <span>${x} out of ${y}</span> correct.`,
      tryAgain:       "Try again",
      rereadStory:    "Re-read the story",
      chooseAnother:  "Choose another story",
      yourAnswer:     "Your answer:",
      correctAnswer:  "Correct:",
      questionsTag:   "questions",
      doneTag:        "Done",
      exampleLabel:      "Example:",
      indicatorLabel:    "Learning",
      wordIntroEyebrow:  "Before you read",
      wordIntroInstruction: "Learn these words. Then read the story.",
      startReading:      "Start reading →",
    },
    nl: {
      learnTitle:     "Wat wil je oefenen?",
      learnSubtitle:  "Kies de taal die je wilt leren.",
      langLabel:      "Verhalen",
      chooseStory:    "Kies een verhaal",
      readStory:      "Lees het verhaal",
      allStories:     "← Alle verhalen",
      startQuestions: "Ik ben klaar — start de vragen!",
      reread:         "Herlees het verhaal",
      keywordsLabel:  "Sleutelwoorden:",
      questionOf:     (x, y) => `Vraag ${x} van ${y}`,
      correct:        "Correct!",
      wrong:          (ans) => `Niet helemaal. Het antwoord was: "${ans}"`,
      nextQuestion:   "Volgende vraag →",
      seeResults:     "Bekijk mijn resultaten!",
      perfectScore:   "Perfecte score!",
      greatJob:       "Geweldig gedaan!",
      goodEffort:     "Goed geprobeerd!",
      keepPractising: "Blijf oefenen!",
      gotCorrect:     (x, y) => `Je had <span>${x} van de ${y}</span> goed.`,
      tryAgain:       "Opnieuw proberen",
      rereadStory:    "Herlees het verhaal",

  // ══════════════════════════════════════════
  //  PROGRESS (localStorage)
  // ══════════════════════════════════════════
  function loadProgress() {
    try { return JSON.parse(localStorage.getItem("lapp_v1") || "{}"); }
    catch { return {}; }
  }
  function saveProgress(idx, s, total) {
    const p = loadProgress();
    if (!p[idx] || s > (p[idx].best || 0)) {
      p[idx] = { done: true, best: s, total };
    }
    try { localStorage.setItem("lapp_v1", JSON.stringify(p)); } catch {}
  }

  // ══════════════════════════════════════════
  //  LANGUAGE SELECTION
  // ══════════════════════════════════════════
  function selectUiLang(lang) {
    interfaceLang = lang;
    document.documentElement.setAttribute("lang", lang);
    applyTranslations();
    showScreen("screen-learn-lang");
  }

  function selectLearnLang(lang) {
    learningLang = lang;
    updateIndicator();
    applyTranslations();
    buildSelectionCards();
    showScreen("screen-select");
  }

  function goToLangScreen() {
    showScreen("screen-ui-lang");
  }

  function updateIndicator() {
    const flags = { en: "🇬🇧", nl: "🇳🇱" };
    const names = { en: "English", nl: "Nederlands" };
    document.getElementById("ui-indicator-flag").textContent  = flags[learningLang];
    document.getElementById("ui-indicator-label").textContent = names[learningLang];
  }

  function applyTranslations() {
    const t = tr();
    const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
    set("ui-learn-title",    t.learnTitle);
    set("ui-learn-subtitle", t.learnSubtitle);
    set("ui-lang-label",     t.langLabel);
    set("ui-choose-story",   t.chooseStory);
    set("ui-back-link",      t.allStories);
    set("ui-read-story",     t.readStory);
    set("ui-start-btn",      t.startQuestions);
    set("ui-keywords-label", t.keywordsLabel);
    set("ui-reread",         t.reread);
    set("ui-try-again",      t.tryAgain);
    set("ui-reread-story",   t.rereadStory);
    set("ui-choose-another", t.chooseAnother);
  }

  // ══════════════════════════════════════════
  //  SCREENS
  // ══════════════════════════════════════════
  function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    window.scrollTo({ top: 0, behavior: "smooth" });
    closeWordPopup();
    const langScreens = ["screen-ui-lang", "screen-learn-lang"];
    document.getElementById("lang-indicator").classList.toggle("hidden", langScreens.includes(id));
    if (id === "screen-select") buildSelectionCards();
  }

  // ══════════════════════════════════════════
  //  STORY SELECTION
  // ══════════════════════════════════════════
  function buildSelectionCards() {
    const t    = tr();
    const prog = loadProgress();
    const wrap = document.getElementById("story-cards-wrap");
    wrap.innerHTML = "";
    stories.forEach((story, idx) => {
      const c    = sc(story);
      const p    = prog[idx];
      const done = p && p.done;
      const best = p ? p.best : null;
      const card = document.createElement("button");
      card.className = "story-card";
      card.setAttribute("aria-label", c.title);
      card.onclick = () => openStory(idx);
      let dots = "";
      for (let d = 1; d <= 3; d++) dots += `<span class="dot${d <= story.difficulty ? " filled" : ""}"></span>`;
      const tagHTML = done
        ? `<span class="tag done">✓ ${t.doneTag} · ${best}/${c.questions.length}</span>`
        : `<span class="tag">${c.questions.length} ${t.questionsTag}</span>`;
      card.innerHTML = `
        <div class="story-card-emoji">${story.emoji}</div>
        <div class="story-card-info">
          <h2>${escHTML(c.title)}</h2>
          <p>${escHTML(c.teaser)}</p>
        </div>
        <div class="story-card-meta">${tagHTML}<div class="difficulty">${dots}</div></div>
        <span class="arrow-icon" aria-hidden="true">›</span>`;
      wrap.appendChild(card);
    });
  }

  function openStory(idx) {
    currentStory = stories[idx];
    currentStory._idx = idx;
    updateStoryScreen();
    buildWordIntroScreen();
    showScreen("screen-word-intro");
  }

  function buildWordIntroScreen() {
    const t   = tr();
    const c   = sc(currentStory);
    const kws = c.keywords || [];

    document.getElementById("ui-word-intro-back").textContent      = t.allStories;
    document.getElementById("ui-word-intro-eyebrow").textContent   = t.wordIntroEyebrow;
    document.getElementById("word-intro-story-title").textContent  = c.title;
    document.getElementById("ui-word-intro-instruction").textContent = t.wordIntroInstruction;
    document.getElementById("ui-word-intro-btn").textContent       = t.startReading;

    const wrap = document.getElementById("word-cards-wrap");
    wrap.innerHTML = "";
    kws.forEach(kw => {
      const meaning = (interfaceLang !== learningLang)
        ? (kw.translation[interfaceLang] || "")
        : (kw.meaning[interfaceLang]     || "");
      const div = document.createElement("div");
      div.className = "word-card";
      div.innerHTML =
        `<div class="word-card-nl">${escHTML(kw.word)}</div>` +
        `<div class="word-card-en">${escHTML(meaning)}</div>` +
        (kw.example ? `<div class="word-card-example">${escHTML(kw.example)}</div>` : "");
      wrap.appendChild(div);
    });
  }

  // ══════════════════════════════════════════
  //  KEYWORD MARKUP
  // ══════════════════════════════════════════
  function escHTML(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function escReg(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }

  function markupText(text) {
    if (!currentKeywords.length) return escHTML(text);
    const sorted = currentKeywords.map((kw, i) => ({ ...kw, i })).sort((a, b) => b.word.length - a.word.length);
    let result = escHTML(text);
    sorted.forEach(kw => {
      const pat = new RegExp(`\\b(${escReg(escHTML(kw.word))})\\b`, "gi");
      result = result.replace(pat, (m) =>
        `<button class="keyword-btn" onclick="showWordPopup(event,${kw.i})">${m}</button>`
      );
    });
    return result;
  }

  function updateStoryScreen() {
    const c = sc(currentStory);
    currentKeywords = c.keywords || [];
    document.getElementById("story-title").textContent = c.title;

    const bar = document.getElementById("keywords-bar");
    const chips = document.getElementById("keywords-chips-wrap");
    if (currentKeywords.length) {
      bar.classList.remove("hidden");
      chips.innerHTML = currentKeywords.map((kw, i) =>
        `<button class="keyword-chip" onclick="showWordPopup(event,${i})">${escHTML(kw.word)}</button>`
      ).join("");
    } else {
      bar.classList.add("hidden");
    }

    document.getElementById("story-body").innerHTML = c.paragraphs.map(p => `<p>${markupText(p)}</p>`).join("");
    document.getElementById("story-mini-text").innerHTML = c.paragraphs.map(p => `<p>${escHTML(p)}</p>`).join("");
  }

  // ══════════════════════════════════════════
  //  WORD POPUP
  // ══════════════════════════════════════════
  function showWordPopup(event, idx) {
    event.stopPropagation();
    const kw     = currentKeywords[idx];
    const t      = tr();
    const popup  = document.getElementById("word-popup");
    const card   = document.querySelector(".card");

    const translation = (interfaceLang !== learningLang)
      ? (kw.translation[interfaceLang] || "")
      : (kw.meaning[interfaceLang] || "");

    document.getElementById("popup-word").textContent        = kw.word;
    document.getElementById("popup-translation").textContent = translation;
    document.getElementById("popup-example-label").textContent = t.exampleLabel;
    document.getElementById("popup-example").textContent     = kw.example || "";

    popup.classList.remove("hidden");
    const br = event.target.getBoundingClientRect();
    const cr = card.getBoundingClientRect();
    let top  = br.bottom - cr.top + 8;
    let left = br.left - cr.left;
    const pw = 280;
    if (left + pw > card.offsetWidth - 16) left = card.offsetWidth - pw - 16;
    if (left < 8) left = 8;
    popup.style.top  = top + "px";
    popup.style.left = left + "px";
  }

  function closeWordPopup() {
    document.getElementById("word-popup").classList.add("hidden");
  }

  document.addEventListener("click", (e) => {
    const popup = document.getElementById("word-popup");
    if (!popup.classList.contains("hidden") && !popup.contains(e.target)) closeWordPopup();
  });

  // ══════════════════════════════════════════
  //  QUESTIONS
  // ══════════════════════════════════════════
  function startQuestions() {
    currentQ = 0; score = 0; answers = [];
    renderQuestion();
    showScreen("screen-question");
  }

  function renderQuestion() {
    const t     = tr();
    const c     = sc(currentStory);
    const q     = c.questions[currentQ];
    const total = c.questions.length;

    document.getElementById("progress-fill").style.width    = (currentQ / total * 100) + "%";
    document.getElementById("progress-label").textContent   = t.questionOf(currentQ + 1, total);
    document.getElementById("question-text").textContent    = q.question;

    const wrap = document.getElementById("options-wrap");
    wrap.innerHTML = "";
    ["A","B","C","D"].forEach((letter, i) => {
      if (i >= q.options.length) return;
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.innerHTML = `<span class="letter">${letter}</span> ${escHTML(q.options[i])}`;
      btn.onclick   = () => selectAnswer(i);
      wrap.appendChild(btn);
    });

    document.getElementById("feedback-box").className = "feedback-box";
    document.getElementById("feedback-verdict").textContent     = "";
    document.getElementById("feedback-explanation").textContent = "";
    document.getElementById("next-btn").style.display = "none";
    document.getElementById("story-mini-wrap").removeAttribute("open");
  }

  function selectAnswer(chosen) {
    const t       = tr();
    const c       = sc(currentStory);
    const q       = c.questions[currentQ];
    const isRight = chosen === q.correct;
    if (isRight) score++;
    answers.push({ correct: isRight, chosen, right: q.correct });

    document.querySelectorAll(".option-btn").forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.correct) btn.classList.add("correct");
      if (i === chosen && !isRight) btn.classList.add("wrong");
    });

    const fb = document.getElementById("feedback-box");
    fb.className = "feedback-box " + (isRight ? "correct" : "wrong");
    document.getElementById("feedback-verdict").textContent =
      isRight ? t.correct : t.wrong(q.options[q.correct]);
    document.getElementById("feedback-explanation").textContent =
      q.explanation ? (q.explanation[interfaceLang] || "") : "";

    const nextBtn = document.getElementById("next-btn");
    nextBtn.style.display = "block";
    nextBtn.textContent = currentQ === c.questions.length - 1 ? t.seeResults : t.nextQuestion;
  }

  function nextQuestion() {
    currentQ++;
    const c = sc(currentStory);
    if (currentQ < c.questions.length) {
      renderQuestion();
    } else {
      saveProgress(currentStory._idx, score, c.questions.length);
      renderResults();
      showScreen("screen-results");
    }
  }

  // ══════════════════════════════════════════
  //  RESULTS
  // ══════════════════════════════════════════
  function renderResults() {
    const t     = tr();
    const c     = sc(currentStory);
    const total = c.questions.length;
    const pct   = score / total;

    let icon, title;
    if (pct === 1)        { icon = "🏆"; title = t.perfectScore; }
    else if (pct >= 0.75) { icon = "🌟"; title = t.greatJob; }
    else if (pct >= 0.5)  { icon = "👍"; title = t.goodEffort; }
    else                  { icon = "📖"; title = t.keepPractising; }

    document.getElementById("results-icon").textContent  = icon;
    document.getElementById("results-title").textContent = title;
    document.getElementById("results-score").innerHTML   = t.gotCorrect(score, total);

    const list = document.getElementById("results-list");
    list.innerHTML = "";
    answers.forEach((ans, i) => {
      const q       = c.questions[i];
      const li      = document.createElement("li");
      li.className  = ans.correct ? "ok" : "fail";
      const yours   = escHTML(q.options[ans.chosen]);
      const right   = escHTML(q.options[ans.right]);
      li.innerHTML  = `<span class="q-label">${ans.correct ? "✓" : "✗"} ${escHTML(q.question)}</span>
        ${ans.correct
          ? `${t.yourAnswer} ${yours}`
          : `${t.yourAnswer} ${yours} — ${t.correctAnswer} ${right}`}`;
      list.appendChild(li);
    });
  }
</script>
</body>
